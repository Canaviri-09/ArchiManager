{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0">Vincular Nuevo Contrato a Proyecto</h4>
            </div>
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="proyecto_id" class="form-label">Proyecto Asociado</label>
                        <select class="form-select" id="proyecto_id" name="proyecto_id" required>
                            <option value="">Seleccione el proyecto...</option>
                            {% for p in proyectos %}
                            <option value="{{ p.id }}">{{ p.codigo }} - {{ p.nombre }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="tipo_contrato_id" class="form-label">Tipo de Contrato</label>
                        <select class="form-select" id="tipo_contrato_id" name="tipo_contrato_id" required>
                            <option value="">Seleccione modalidad...</option>
                            {% for t in tipos %}
                            <option value="{{ t.id }}">{{ t.nombre }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="numero_contrato" class="form-label">Número de Contrato Único</label>
                        <input type="text" class="form-control" id="numero_contrato" name="numero_contrato" required placeholder="Ej: CONT-2026-XYZ">
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="fecha_firma" class="form-label">Fecha de Firma</label>
                            <input type="date" class="form-control" id="fecha_firma" name="fecha_firma" required>
                        </div>
                        <div class="col-md-6">
                            <label for="estado" class="form-label">Estado Legal</label>
                            <select class="form-select" id="estado" name="estado" required>
                                <option value="Activo">Activo</option>
                                <option value="Finalizado">Finalizado</option>
                                <option value="Rescindido">Rescindido</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="archivo_pdf" class="form-label">Documento Escaneado (Solo PDF)</label>
                        <input class="form-control" type="file" id="archivo_pdf" name="archivo_pdf" accept="application/pdf" required>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('contratos.index') }}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary">Guardar Contrato</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
