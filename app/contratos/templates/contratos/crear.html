{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center py-4">
    <div class="col-md-8 col-lg-6">
        <div class="card border-0 shadow-sm bg-white rounded-3">
            <div class="card-body p-4 p-md-5">
                <div class="mb-4">
                    <h3 class="fw-bold text-dark mb-1"><i class="bi bi-file-earmark-arrow-up-fill text-danger me-2"></i>Vincular Nuevo Contrato</h3>
                    <p class="text-secondary small">Asocia un documento legal en PDF al expediente técnico de un proyecto</p>
                </div>
                
                <form method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="proyecto_id" class="form-label text-dark-emphasis fw-semibold small">Proyecto Asociado</label>
                        <select class="form-select bg-white py-2" id="proyecto_id" name="proyecto_id" required>
                            <option value="">Seleccione el proyecto...</option>
                            {% for p in proyectos %}
                            <option value="{{ p.id }}">{{ p.codigo }} - {{ p.nombre }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="tipo_contrato_id" class="form-label text-dark-emphasis fw-semibold small">Tipo de Contrato</label>
                        <select class="form-select bg-white py-2" id="tipo_contrato_id" name="tipo_contrato_id" required>
                            <option value="">Seleccione modalidad...</option>
                            {% for t in tipos %}
                            <option value="{{ t.id }}">{{ t.nombre }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="numero_contrato" class="form-label text-dark-emphasis fw-semibold small">Número de Contrato Único</label>
                        <input type="text" class="form-control bg-white py-2" id="numero_contrato" name="numero_contrato" required placeholder="Ej: CONT-2026-XYZ">
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6 mb-3 mb-md-0">
                            <label for="fecha_firma" class="form-label text-dark-emphasis fw-semibold small">Fecha de Firma</label>
                            <input type="date" class="form-control bg-white py-2" id="fecha_firma" name="fecha_firma" required>
                        </div>
                        <div class="col-md-6">
                            <label for="estado" class="form-label text-dark-emphasis fw-semibold small">Estado Legal</label>
                            <select class="form-select bg-white py-2" id="estado" name="estado" required>
                                <option value="Activo">Activo</option>
                                <option value="Finalizado">Finalizado</option>
                                <option value="Rescindido">Rescindido</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="archivo_pdf" class="form-label text-dark-emphasis fw-semibold small">Documento Escaneado (Solo PDF)</label>
                        <input class="form-control bg-white py-2" type="file" id="archivo_pdf" name="archivo_pdf" accept="application/pdf" required>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mt-4">
                        <a href="{{ url_for('contratos.index') }}" class="btn btn-outline-secondary fw-bold px-4 py-2 rounded-3">Cancelar</a>
                        <button type="submit" class="btn btn-danger fw-bold px-4 py-2 rounded-3 shadow-sm">Guardar Contrato</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
