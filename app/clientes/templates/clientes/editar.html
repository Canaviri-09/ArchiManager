{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center py-4">
    <div class="col-md-8 col-lg-6">
        <div class="card border-0 shadow-sm bg-white rounded-3">
            <div class="card-body p-4 p-md-5">
                <div class="mb-4">
                    <h3 class="fw-bold text-dark mb-1"><i class="bi bi-pencil-square text-danger me-2"></i>Editar Cliente #{{ cliente.id }}</h3>
                    <p class="text-secondary small">Modifica la información registrada de la cuenta comercial</p>
                </div>
                <form method="POST">
                    <div class="mb-3">
                        <label for="nombre" class="form-label text-dark-emphasis fw-semibold small">Nombre Completo / Contacto</label>
                        <input type="text" class="form-control bg-white py-2" id="nombre" name="nombre" value="{{ cliente.nombre }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="empresa" class="form-label text-dark-emphasis fw-semibold small">Empresa / Razón Social</label>
                        <input type="text" class="form-control bg-white py-2" id="empresa" name="empresa" value="{{ cliente.empresa }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="telefono" class="form-label text-dark-emphasis fw-semibold small">Teléfono</label>
                        <input type="text" class="form-control bg-white py-2" id="telefono" name="telefono" value="{{ cliente.telefono }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="correo" class="form-label text-dark-emphasis fw-semibold small">Correo Electrónico</label>
                        <input type="email" class="form-control bg-white py-2" id="correo" name="correo" value="{{ cliente.correo }}" required>
                    </div>
                    <div class="mb-4">
                        <label for="nit" class="form-label text-dark-emphasis fw-semibold small">NIT / Identificación Fiscal</label>
                        <input type="text" class="form-control bg-white py-2" id="nit" name="nit" value="{{ cliente.nit }}" required>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mt-4">
                        <a href="{{ url_for('clientes.index') }}" class="btn btn-outline-secondary fw-bold px-4 py-2 rounded-3">Cancelar</a>
                        <button type="submit" class="btn btn-danger fw-bold px-4 py-2 rounded-3 shadow-sm">Actualizar Información</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
