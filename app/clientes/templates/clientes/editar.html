{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-warning text-dark">
                <h4 class="mb-0">Editar Cliente #{{ cliente.id }}</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="nombre" class="form-label">Nombre Completo / Contacto</label>
                        <input type="text" class="form-control" id="nombre" name="nombre" value="{{ cliente.nombre }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="empresa" class="form-label">Empresa / Razón Social</label>
                        <input type="text" class="form-control" id="empresa" name="empresa" value="{{ cliente.empresa }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="telefono" class="form-label">Teléfono</label>
                        <input type="text" class="form-control" id="telefono" name="telefono" value="{{ cliente.telefono }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="correo" class="form-label">Correo Electrónico</label>
                        <input type="email" class="form-control" id="correo" name="correo" value="{{ cliente.correo }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="nit" class="form-label">NIT / Identificación Fiscal</label>
                        <input type="text" class="form-control" id="nit" name="nit" value="{{ cliente.nit }}" required>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('clientes.index') }}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary">Actualizar Información</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
