{% extends 'base.html' %}
{% block title %}Nuevo Usuario - ArchiManager{% endblock %}
{% block content %}

<div class="d-flex justify-content-center align-items-center py-4">
    <div class="card border-0 shadow-sm bg-white rounded-3" style="max-width: 540px; width: 100%;">
        <div class="card-body p-4 p-md-5">
            <div class="mb-4">
                <h3 class="fw-bold text-dark mb-1"><i class="bi bi-person-plus-fill text-danger me-2"></i>Nuevo Usuario</h3>
                <p class="text-secondary small">Crea una nueva cuenta de acceso profesional</p>
            </div>
            
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label text-dark-emphasis fw-semibold small">Nombre completo</label>
                    <input type="text" name="nombre" class="form-control bg-white py-2" required placeholder="Ej: Arq. María Delgado">
                </div>
                <div class="mb-3">
                    <label class="form-label text-dark-emphasis fw-semibold small">Correo</label>
                    <input type="email" name="correo" class="form-control bg-white py-2" required placeholder="correo@archimanager.com">
                </div>
                <div class="mb-3">
                    <label class="form-label text-dark-emphasis fw-semibold small">Contraseña</label>
                    <input type="password" name="password" class="form-control bg-white py-2" required placeholder="••••••••">
                </div>
                <div class="mb-3">
                    <label class="form-label text-dark-emphasis fw-semibold small">Rol</label>
                    <select name="rol_id" class="form-select bg-white py-2" required>
                        <option value="" disabled selected>Selecciona un rol</option>
                        {% for rol in roles %}
                            <option value="{{ rol.id }}">{{ rol.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label text-dark-emphasis fw-semibold small">Especialidad (opcional)</label>
                    <select name="especialidad_id" class="form-select bg-white py-2">
                        <option value="">Sin especialidad</option>
                        {% for especialidad in especialidades %}
                            <option value="{{ especialidad.id }}">{{ especialidad.nombre }} ({{ especialidad.tipo }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-check mb-4">
                    <input type="checkbox" name="activo" class="form-check-input" id="activo" checked>
                    <label class="form-check-label text-dark-emphasis small fw-medium" for="activo">Usuario activo</label>
                </div>
                <div class="d-flex justify-content-between align-items-center mt-4">
                    <a href="{{ url_for('usuarios.listar') }}" class="btn btn-outline-secondary fw-bold px-4 py-2 rounded-3">Cancelar</a>
                    <button type="submit" class="btn btn-danger fw-bold px-4 py-2 rounded-3 shadow-sm">Guardar</button>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
