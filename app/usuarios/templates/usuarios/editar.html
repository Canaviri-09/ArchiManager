{% extends 'base.html' %}
{% block title %}Editar Usuario{% endblock %}
{% block content %}

<div class="d-flex justify-content-center">
    <div class="card" style="max-width: 520px; width: 100%;">
        <div class="card-header bg-dark text-white">
            <h5 class="mb-0">Editar Usuario</h5>
        </div>
        <div class="card-body">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Nombre completo</label>
                    <input type="text" name="nombre" class="form-control" value="{{ usuario.nombre }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Correo</label>
                    <input type="email" name="correo" class="form-control" value="{{ usuario.correo }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Nueva contraseña</label>
                    <input type="password" name="password" class="form-control" placeholder="Dejar en blanco para no cambiarla">
                </div>
                <div class="mb-3">
                    <label class="form-label">Rol</label>
                    <select name="rol_id" class="form-select" required>
                        {% for rol in roles %}
                            <option value="{{ rol.id }}" {% if usuario.rol_id == rol.id %}selected{% endif %}>{{ rol.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Especialidad (opcional)</label>
                    <select name="especialidad_id" class="form-select">
                        <option value="">Sin especialidad</option>
                        {% for especialidad in especialidades %}
                            <option value="{{ especialidad.id }}" {% if usuario.especialidad_id == especialidad.id %}selected{% endif %}>{{ especialidad.nombre }} ({{ especialidad.tipo }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-check mb-3">
                    <input type="checkbox" name="activo" class="form-check-input" id="activo" {% if usuario.activo %}checked{% endif %}>
                    <label class="form-check-label" for="activo">Usuario activo</label>
                </div>
                <div class="d-flex justify-content-between">
                    <a href="{{ url_for('usuarios.listar') }}" class="btn btn-outline-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-dark">Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
